repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        pass_filenames: false
        files: '(^Cargo\.(toml|lock)$|\.rs$)'

      - id: cargo-test-rstu-ast
        name: cargo test -p rstu_ast
        entry: cargo test -p rstu_ast
        language: system
        pass_filenames: false
        files: '^(Cargo\.(toml|lock)|crates/rstu_ast/)'